<!DOCTYPE html>
<html lang="en">
<head>
    <title>Pomodoro Timer</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <header class="title">
        <h1>Pomodoro</h1>
        <img src="imgs/tomato.png" alt="Tomato"/>
    </header>
    <section id="pomodoro" class="pomodoro">
        <div class="setting">
            <button id="btnFocus">Focus Time</button>
            <button id="btnBreak">Break Time</button>
        </div>
        <div id="time" class="time">
        </div>
        <button id="btnPlay" class="btnPlay">START</button>
    </section>
    <section class="notification">
        <p id="noti" class="noti">Time to focus!</p>
        <button id="btnSound" class="btn-sound" type="button" aria-label="Toggle sound">
            <i id="soundIcon" class="fas fa-volume-up" aria-hidden="true"></i>
        </button>
    </section>
    <p id="sessionCount" class="session-count">Completed focus sessions: 0</p>
    <section id="settingsPanel" class="pomodoro-settings">
        <h2>Timer Settings</h2>
        <form id="settingsForm" class="settings-form">
            <label class="setting-field" for="focusMinutesInput">
                Focus (minutes)
                <input id="focusMinutesInput" type="number" min="1" max="180" step="1" required>
            </label>
            <label class="setting-field" for="shortBreakMinutesInput">
                Short break (minutes)
                <input id="shortBreakMinutesInput" type="number" min="1" max="60" step="1" required>
            </label>
            <label class="setting-field" for="longBreakMinutesInput">
                Long break (minutes)
                <input id="longBreakMinutesInput" type="number" min="1" max="90" step="1" required>
            </label>
            <label class="setting-field" for="longBreakEveryInput">
                Long break every (focus sessions)
                <input id="longBreakEveryInput" type="number" min="2" max="12" step="1" required>
            </label>
            <div class="settings-actions">
                <button id="saveSettingsBtn" type="submit" class="settings-btn">Save</button>
                <button id="resetSettingsBtn" type="button" class="settings-btn settings-btn-secondary">Reset</button>
            </div>
            <p id="settingsMessage" class="settings-message" aria-live="polite"></p>
        </form>
    </section>
    <section class="playListMusic">
        <div class="playListSetting">
            <h2>Musics</h2>
            <input id="fileInput" type="file" accept="audio/*" multiple>
            <label id="file-input-label" for="fileInput" class="file-input-label">
                <i class="fas fa-plus"></i>
            </label>
        </div>
        <hr>
        <div id="music-player" class="music-player">
            <div class="music-info">
                <span id="music-name">No music playing</span>
            </div>
        </div>
        <div class="playlist">
            <ul id="playlist">
                <!-- Add more songs here -->
            </ul>
        </div>
    </section>
    <audio id="audio" src="sounds/button_sound.mp3"></audio>
    <audio id="buttonSound" src="sounds/button_sound.mp3"></audio>
    <script src="pomodoro.js"></script>
    <script src="musicPlayer.js"></script>
    <script src="playlist.js"></script>
</body>
</html>
