<!DOCTYPE html>
<html lang="en">
<head>
    <title>Pomodoro Timer</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <div class="brand">
                <img src="imgs/tomato.png" alt="Tomato"/>
                <h1>Pomodoro</h1>
            </div>
            <div class="top-actions">
                <button id="btnSettings" class="top-action-btn" type="button" aria-label="Open timer settings" aria-controls="settingsModal" aria-expanded="false">
                    <i class="fas fa-gear" aria-hidden="true"></i>
                    <span>Setting</span>
                </button>
            </div>
        </header>

        <section id="pomodoro" class="pomodoro">
            <div class="setting">
                <button id="btnFocus">Pomodoro</button>
                <button id="btnBreak">Short Break</button>
                <button id="btnLongBreak">Long Break</button>
            </div>
            <div id="time" class="time"></div>
            <button id="btnPlay" class="btnPlay">START</button>
        </section>

        <p id="sessionCount" class="session-count">#1</p>

        <section class="notification">
            <p id="noti" class="noti">Time to focus!</p>
            <button id="btnSound" class="btn-sound" type="button" aria-label="Toggle sound">
                <i id="soundIcon" class="fas fa-volume-up" aria-hidden="true"></i>
            </button>
        </section>

        <section class="tasks-board" aria-label="Tasks board">
            <div class="tasks-head">
                <h2>Tasks</h2>
                <button class="tasks-menu-btn" type="button" aria-label="Task options">
                    <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                </button>
            </div>
            <p id="tasksEmptyState" class="tasks-empty">No tasks yet. Add your first task.</p>
            <ul id="tasksList" class="tasks-list" aria-live="polite" hidden></ul>
            <button id="btnAddTask" class="add-task-btn" type="button" aria-label="Add task" aria-controls="taskModal" aria-expanded="false">
                <i class="fas fa-circle-plus" aria-hidden="true"></i>
                <span>Add Task</span>
            </button>
        </section>
    </main>

    <div id="settingsModal" class="settings-modal" hidden>
        <section id="settingsPanel" class="pomodoro-settings" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <div class="settings-header">
                <h2 id="settingsTitle">Timer Settings</h2>
                <button id="closeSettingsBtn" class="close-settings-btn" type="button" aria-label="Close timer settings">
                    <i class="fas fa-times" aria-hidden="true"></i>
                </button>
            </div>
            <form id="settingsForm" class="settings-form">
                <label class="setting-field" for="focusMinutesInput">
                    Focus (minutes)
                    <input id="focusMinutesInput" type="number" min="1" max="180" step="1" required>
                </label>
                <label class="setting-field" for="shortBreakMinutesInput">
                    Short break (minutes)
                    <input id="shortBreakMinutesInput" type="number" min="1" max="60" step="1" required>
                </label>
                <label class="setting-field" for="longBreakMinutesInput">
                    Long break (minutes)
                    <input id="longBreakMinutesInput" type="number" min="1" max="90" step="1" required>
                </label>
                <label class="setting-field" for="longBreakEveryInput">
                    Long break every (sessions)
                    <input id="longBreakEveryInput" type="number" min="2" max="12" step="1" required>
                </label>
                <label class="setting-toggle" for="enableNotificationsInput">
                    <input id="enableNotificationsInput" type="checkbox">
                    Enable browser notifications
                </label>
                <label class="setting-toggle" for="autoStartNextInput">
                    <input id="autoStartNextInput" type="checkbox">
                    Auto-start next session after timer ends
                </label>
                <div class="settings-actions">
                    <button id="saveSettingsBtn" type="submit" class="settings-btn">Save</button>
                    <button id="resetSettingsBtn" type="button" class="settings-btn settings-btn-secondary">Reset</button>
                </div>
                <p id="settingsMessage" class="settings-message" aria-live="polite"></p>
            </form>
        </section>
    </div>

    <div id="taskModal" class="settings-modal" hidden>
        <section id="taskPanel" class="task-modal-panel" role="dialog" aria-modal="true" aria-labelledby="taskTitle">
            <div class="settings-header">
                <h2 id="taskTitle">Add Task</h2>
                <button id="closeTaskBtn" class="close-settings-btn" type="button" aria-label="Close add task dialog">
                    <i class="fas fa-times" aria-hidden="true"></i>
                </button>
            </div>
            <form id="taskForm" class="task-form">
                <label class="task-field" for="taskInput">
                    Task name
                    <input id="taskInput" type="text" maxlength="120" placeholder="Ex: Review weekly report" required>
                </label>
                <div class="task-actions">
                    <button id="cancelTaskBtn" type="button" class="settings-btn settings-btn-secondary">Cancel</button>
                    <button id="saveTaskBtn" type="submit" class="settings-btn">Add Task</button>
                </div>
                <p id="taskMessage" class="task-message" aria-live="polite"></p>
            </form>
        </section>
    </div>

    <audio id="audio" src="sounds/button_sound.mp3"></audio>
    <script src="pomodoro.js"></script>
</body>
</html>
